# Serves the built SPA. `try_files ... /index.html` keeps client-side
# routes (react-router) working on hard refresh/deep links.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets get long-lived caching; index.html must not, so a new
    # deploy is picked up on the next load.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
